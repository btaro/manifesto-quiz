<script>
const { useState, useCallback, useRef, useEffect } = React;
const e = React.createElement;

// ===== クイズデータ =====
const quizData = [
  {
    category: "ビジョン",
    question: "今の日本が直面している構造的な問題について、チームみらいはどのように認識していますか？具体的な数字を交えて説明してください。",
    modelAnswer: "チームみらいは、日本が「未来を左右する分かれ道」に立っていると認識しています。\n\n【経済の停滞】先進国の中で唯一、この20年にわたって平均年収が増えておらず、実質GDPもほとんど成長していません。世界ではインターネット関連で新しい産業が生まれましたが、日本から世界的なインターネット企業は生まれず、デジタル赤字は増え続けています。\n\n【少子高齢化】2025年の出生数は66.5万人と過去最少を更新しました。高齢化も進み、労働力の中核となる生産年齢人口の割合はどんどん減っていきます。\n\n【社会保障の持続性】社会保障費は今後も増加を続け、現役世代の負担はすでに極めて重い水準にあります。将来世代には一層大きな負担がのしかかることが予想されており、今のままでは持続可能とは言えません。\n\n【政治の問題】「政治とカネ」問題に代表されるように、政治への信頼は大きく揺らいでいます。また、政治で取り上げられるのは「どう再分配するか」の話ばかりで「どう成長するか」の議論が不足しています。\n\nただし、日本の教育水準は高く、治安も良く、投資余力もあるため、これらの力を正しい方向に使えば状況を変えられるとしています。",
    keyPoints: ["平均年収20年間横ばい、実質GDP成長なし", "出生数66.5万人（過去最少）", "社会保障費の増大と現役世代の過重負担", "デジタル赤字の増大、世界的IT企業が日本から生まれていない", "政治への信頼低下、再分配偏重で成長戦略の議論が不足", "教育水準・治安・投資余力という強みも残っている"]
  },
  {
    category: "ビジョン",
    question: "チームみらいのマニフェストは「3つの柱」で構成されています。それぞれの柱の内容と、含まれる政策分野を説明してください。",
    modelAnswer: "チームみらいのマニフェストは以下の3つの柱で構成されています。\n\n【第1の柱：「未来」に向けた成長投資】\n日本全体の成長を目指す政策です。未来を担う世代と産業への大胆な投資を行います。\n・子育て・教育：「子育て減税」などの抜本的経済支援とプッシュ型支援で、日本を世界一の子育て先進国にする。AIを活用したオーダーメイドの学びを全ての子どもに届ける。\n・科学技術・産業・エネルギー：AI、ロボティクス、自動運転などの技術を社会実装し新産業を創出。大学運営費交付金の拡充など基礎研究への投資も重視。安定的かつ大量の電力確保。\n\n【第2の柱：「今」の生活をしっかり支援】\n国民の暮らしを守る政策です。物価高の中で働く人の負担を軽くし、生活を直接支えます。\n・経済財政：複雑化した税・社会保障制度をシンプルでなめらかに改革し、現役世代の過度な負担を軽減。\n・医療：高額療養費制度を守りつつ、テクノロジーで持続可能な国民皆保険を実現。\n・福祉：テクノロジーで支援を「探す」から「届く」へ転換。\n\n【第3の柱：「テクノロジー」で行政・政治改革】\nデジタルの力で政治と行政の仕組みを刷新します。\n・くらしと行政：政党自らが国会・行政のDXを推進し、負担なく公共サービスにアクセスできる行政を実現。\n・デジタル民主主義：AIとデジタル技術で多様な国民の声を可視化・集約し、新しい民主主義の形を実装。",
    keyPoints: ["第1の柱「未来」＝成長投資（子育て・教育・科学技術・産業・エネルギー）", "第2の柱「今」＝生活支援（経済財政・医療・福祉）", "第3の柱「テクノロジー」＝行政・政治改革（くらしと行政・デジタル民主主義）", "全体として未来・今・テクノロジーに主眼を置く"]
  },
  {
    category: "教育",
    question: "チームみらいが提唱する「AI学習アシスタント」と「オーダーメイドカリキュラム」について、現状の課題と具体的な政策を説明してください。",
    modelAnswer: "【現状の課題】\n現在の学校教育は、学年・教科ごとに厳格に定められた「標準授業時数」に基づく一律型のカリキュラムが中心です。全員が同じペースで同じ内容を学ぶ仕組みのため、理解の速い子も遅い子も一つのクラスに収められ、一人ひとりの学びの最適化が困難です。教員の多忙化もあり、個別対応には限界があります。\n\n【AI学習アシスタントの導入】\n・全国すべての小中学校にAI学習アシスタントを導入します。\n・AIが個々の理解度・進捗・興味関心を把握し、一人ひとりに最適な教材・問題・学習パスを提示する「オーダーメイドカリキュラム」を実現します。\n・教師はAIが担える基礎的な知識伝達から解放され、対話・探究・メンタリングなど人にしかできない役割に集中できるようになります。\n\n【制度改革】\n・標準授業時数の「大綱化」を行い、学年・教科ごとの時数配分を柔軟化します。これにより、AIによる個別最適化された学びに制度が対応できるようにします。\n\n【日本版飛び級制度】\n・AIアシスタントを活用し、15歳で高校卒業レベルの基礎知識を習得し、早期に大学や社会で活躍できる「日本版飛び級制度」を構築します。",
    keyPoints: ["現行の一律型カリキュラムでは個別最適化が困難", "全国すべての小中学校にAI学習アシスタントを導入", "標準授業時数の「大綱化」で柔軟な制度に", "教師は対話・探究・メンタリングに集中", "15歳で高校卒業レベルの日本版飛び級制度"]
  },
  {
    category: "教育",
    question: "AIリテラシー教育とSTEAM教育について、チームみらいの政策を説明してください。",
    modelAnswer: "【AIリテラシー教育】\n・中学校に教科「情報」を新設します。現在の技術・家庭科（情報分野）は3年間で70時間しかなく、AI時代のリテラシー教育としては時間が圧倒的に不足しています。\n・高校段階では、AIに特化した先進校的な高校「Super AI High Schools（SAIS）」を設立します。SSH（スーパーサイエンスハイスクール）を土台にした制度枠組みで、AIの利活用に特化した学校です。\n・全学年でプログラミング的思考、データリテラシー、AIの仕組みと限界、倫理面を段階的に学ぶカリキュラムを整備します。\n\n【STEAM教育の推進】\n・STEAM教育（Science, Technology, Engineering, Arts, Mathematics）を体系的に推進します。\n・特にArts（芸術・リベラルアーツ）を含む点が特徴で、創造性と論理的思考の両方を育てます。\n・探究的な学びを重視し、実社会の課題と接続した学びの機会を増やします。\n\n【EdTech投資】\n・500億円規模のEdTechスタートアップへの政府ファンドを新設し、教育テクノロジーの開発と普及を加速します。",
    keyPoints: ["中学校に教科「情報」を新設（現行は3年間で70時間のみ）", "Super AI High Schools（SAIS）の設立", "STEAM = Science, Technology, Engineering, Arts, Mathematics", "500億円規模のEdTechスタートアップ政府ファンド新設"]
  },
  {

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

          e("p", null, "質問に長文で回答し、模範解答と比較して定着を図りましょう")
        ),
        stats.total > 0 && e("div", { className: "stats-bar" },
          e("div", { className: "label" }, "学習の記録"),
          e("div", { className: "nums" },
            e("div", null, e("span", { className: "big" }, stats.total), e("span", { className: "unit" }, "問回答")),
            e("div", { className: "scores" },
              e("span", { className: "score-good" }, "\u25ce" + stats.scores[3]),
              e("span", { className: "score-ok" }, "\u25cb" + stats.scores[2]),
              e("span", { className: "score-bad" }, "\u25b3" + stats.scores[1])
            )
          )
        ),
        e("div", { className: "menu-card" },
          e("h2", null, "分野を選ぶ"),
          e("div", { className: "cat-grid" },
            categories.map(function(cat) {
              return e("button", {
                key: cat.id,
                className: "cat-btn" + (selectedCategory === cat.id ? " active" : ""),
                onClick: function() { setSelectedCategory(cat.id); }
              },
                cat.icon + " " + cat.label,
                e("span", { className: "count" },
                  "(" + (cat.id === "all" ? quizData.length : quizData.filter(function(q) { return q.category === cat.id; }).length) + ")"
                )
              );
            })
          ),
          e("button", { className: "start-btn", onClick: startQuiz }, "学習をはじめる")
        ),
        e("div", { className: "howto" },
          e("div", { className: "title" }, "使い方"),
          "1. 質問を読んで、テキストエリアに自分の言葉で回答を書く", e("br"),
          "2. 「模範解答を見る」をタップして模範解答と比較する", e("br"),
          "3. 自己採点で◎○△をつけて次の問題へ"
        ),
        e("div", { className: "share-section" },
          e("button", { className: "share-btn", onClick: handleShare }, "\ud83d\udce4 このツールを共有する")
        )
      )
    );
  }

  // ===== クイズ画面 =====
  if (screen === "quiz" && currentQ) {
    var catObj = categories.find(function(c) { return c.id === currentQ.category; });

    return e("div", { className: "screen-quiz" },
      e("div", { className: "quiz-inner" },
        e("div", { className: "quiz-topbar" },
          e("button", {
            className: "back-btn",
            onClick: function() { if (confirm("メニューに戻りますか？進捗は保持されます。")) setScreen("menu"); }
          }, "\u2190 戻る"),
          e("span", { className: "progress-text" }, (currentIndex + 1) + " / " + questions.length)
        ),
        e("div", { className: "q-card" },
          e("span", { className: "q-badge" }, (catObj ? catObj.icon : "") + " " + currentQ.category),
          e("h2", { className: "q-text" }, currentQ.question)
        ),
        e("div", { className: "ans-card" },
          e("div", { className: "ans-label" }, "あなたの回答"),
          e("textarea", {
            ref: textareaRef,
            className: "ans-textarea",
            value: userAnswer,
            onChange: function(ev) { setUserAnswer(ev.target.value); },
            disabled: showModel,
            placeholder: "ここに回答を記述してください。覚えていることをできるだけ具体的に書きましょう..."
          }),
          !showModel && e("button", { className: "show-btn", onClick: handleShowAnswer }, "模範解答を見る")
        ),
        showModel && e(React.Fragment, null,
          e("div", { className: "model-card" },
            e("div", { className: "model-label" }, "模範解答"),
            e("div", { className: "model-text" }, currentQ.modelAnswer)
          ),
          e("div", { className: "kp-card" },
            e("div", { className: "kp-label" }, "押さえるべきポイント"),
            currentQ.keyPoints.map(function(point, i) {
              return e("div", { key: i, className: "kp-item" }, point);
            })
          ),
          selfScore === null
            ? e("div", { className: "scoring-card" },
                e("div", { className: "scoring-title" }, "自己採点してください"),
                e("div", { className: "scoring-btns" },
                  [
                    { score: 3, label: "よく書けた", icon: "\u25ce", cls: "green", desc: "主要ポイントをほぼ網羅" },
                    { score: 2, label: "まあまあ", icon: "\u25cb", cls: "orange", desc: "部分的に思い出せた" },
                    { score: 1, label: "もう少し", icon: "\u25b3", cls: "red", desc: "ほとんど書けなかった" }
                  ].map(function(opt) {
                    return e("button", {
                      key: opt.score,
                      className: "score-btn " + opt.cls,
                      onClick: function() { handleScore(opt.score); }
                    },
                      e("div", { className: "icon" }, opt.icon),
                      e("div", { className: "name" }, opt.label),
                      e("div", { className: "desc" }, opt.desc)
                    );
                  })
                )
              )
            : e("button", { className: "next-btn", onClick: nextQuestion },
                currentIndex + 1 >= questions.length ? "結果を見る" : "次の問題へ →"
              )
        )
      )
    );
  }

  // ===== 結果画面 =====
  if (screen === "result") {
    var total = results.length;
    var s3 = results.filter(function(r) { return r.score === 3; }).length;
    var s2 = results.filter(function(r) { return r.score === 2; }).length;
    var s1 = results.filter(function(r) { return r.score === 1; }).length;

    var catBreak = {};
    results.forEach(function(r) {
      var c = r.question.category;
      if (!catBreak[c]) catBreak[c] = { total: 0, s3: 0, s2: 0, s1: 0 };
      catBreak[c].total++;
      if (r.score === 3) catBreak[c].s3++;
      else if (r.score === 2) catBreak[c].s2++;
      else catBreak[c].s1++;
    });

    var needReview = results.filter(function(r) { return r.score <= 2; });

    return e("div", { className: "screen-result" },
      e("div", { className: "result-inner" },
        e("div", { className: "result-header" },
          e("h1", null, "学習結果"),
          e("p", null, total + "問に回答しました")
        ),
        e("div", { className: "result-card" },
          e("div", { className: "result-scores" },
            e("div", { className: "item" }, e("div", { className: "num", style: { color: "#4caf50" } }, s3), e("div", { className: "lbl" }, "◎ よく書けた")),
            e("div", { className: "item" }, e("div", { className: "num", style: { color: "#ff9800" } }, s2), e("div", { className: "lbl" }, "○ まあまあ")),
            e("div", { className: "item" }, e("div", { className: "num", style: { color: "#ef5350" } }, s1), e("div", { className: "lbl" }, "△ もう少し"))
          ),
          e("div", { style: { borderTop: "1px solid #eee", paddingTop: 16 } },
            Object.keys(catBreak).map(function(cat) {
              var data = catBreak[cat];
              var catObj = categories.find(function(c) { return c.id === cat; });
              return e("div", { key: cat, className: "cat-row" },
                e("span", { className: "name" }, (catObj ? catObj.icon : "") + " " + cat),
                e("div", { className: "bar" },
                  data.s3 > 0 && e("div", { className: "bar-g", style: { width: (data.s3/data.total*100) + "%" } }),
                  data.s2 > 0 && e("div", { className: "bar-o", style: { width: (data.s2/data.total*100) + "%" } }),
                  data.s1 > 0 && e("div", { className: "bar-r", style: { width: (data.s1/data.total*100) + "%" } })
                ),
                e("span", { className: "detail" }, "\u25ce" + data.s3 + " \u25cb" + data.s2 + " \u25b3" + data.s1)
              );
            })
          )
        ),
        needReview.length > 0 && e("div", { className: "review-card" },
          e("h3", null, "復習が必要な問題 (" + needReview.length + "問)"),
          needReview.map(function(r, i) {
            return e("div", { key: i, className: "review-item" },
              e("div", { className: "top" },
                e("span", { className: "cat" }, r.question.category),
                e("span", { style: { fontSize: 16, color: r.score === 2 ? "#ff9800" : "#ef5350" } },
                  r.score === 2 ? "\u25cb" : "\u25b3"
                )
              ),
              e("div", { className: "q" }, r.question.question),
              e("div", { className: "kp" },
                e("strong", null, "キーポイント："),
                " " + r.question.keyPoints.join(" / ")
              )
            );
          })
        ),
        e("button", { className: "home-btn", onClick: function() { setScreen("menu"); } }, "メニューに戻る"),
        e("div", { className: "share-section", style: { marginTop: 12, marginBottom: 32 } },
          e("button", { className: "share-btn", onClick: handleShare }, "\ud83d\udce4 このツールを共有する")
        )
      )
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById("app")).render(e(ManifestoStudy));
</script>
</body>
</html>
