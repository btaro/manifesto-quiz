<!DOCTYPE html>
<html lang="ja">

<title>茫聝聛茫聝录茫聝聽茫聛驴茫聜聣茫聛聞 茫聝聻茫聝聥茫聝聲茫聜搂茫聜鹿茫聝聢忙職聴猫篓聵茫聝聞茫聝录茫聝芦</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {

/* 茫聝隆茫聝聥茫聝楼茫聝录莽聰禄茅聺垄 */
.screen-menu {
  min-height: 100vh; min-height: 100dvh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 16px;
}
.menu-inner { max-width: 680px; margin: 0 auto; }
.menu-header { text-align: center; padding: 32px 0 24px; }
.menu-header h1 { font-size: 22px; color: white; font-weight: 800; letter-spacing: 0.02em; line-height: 1.4; }
.menu-header p { color: rgba(255,255,255,0.7); margin-top: 8px; font-size: 13px; line-height: 1.6; }

.stats-bar {
  background: rgba(255,255,255,0.08); border-radius: 14px; padding: 16px 20px;
  margin-bottom: 18px; color: white; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
}
.stats-bar .label { font-size: 11px; opacity: 0.6; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; }
.stats-bar .nums { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; }
.stats-bar .big { font-size: 26px; font-weight: 700; }
.stats-bar .unit { font-size: 11px; margin-left: 3px; opacity: 0.7; }
.stats-bar .scores { display: flex; gap: 10px; align-items: center; font-size: 14px; }
.score-good { color: #4caf50; }
.score-ok { color: #ff9800; }
.score-bad { color: #ef5350; }

.menu-card {
  background: rgba(255,255,255,0.95); border-radius: 18px; padding: 24px;
  margin-bottom: 18px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.menu-card h2 { font-size: 14px; margin-bottom: 14px; color: #333; font-weight: 700; }

.cat-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.cat-btn {
  padding: 7px 12px; border-radius: 20px; border: 2px solid #e0e0e0;
  background: white; color: #555; font-weight: 400; font-size: 12px;
  cursor: pointer; transition: all 0.2s; line-height: 1.4;
}
.cat-btn.active { border-color: #0f3460; background: #e8eaf6; color: #0f3460; font-weight: 700; }
.cat-btn .count { margin-left: 3px; opacity: 0.5; font-size: 10px; }

.start-btn {
  width: 100%; padding: 15px; margin-top: 20px; border-radius: 14px;
  border: none; background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white; font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 20px rgba(15,52,96,0.4); transition: transform 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}
.start-btn:active { transform: scale(0.98); }

.howto {
  background: rgba(255,255,255,0.06); border-radius: 14px; padding: 16px 20px;
  color: rgba(255,255,255,0.65); font-size: 12px; line-height: 1.8; margin-bottom: 20px;
}
.howto .title { font-weight: 700; margin-bottom: 6px; color: rgba(255,255,255,0.85); font-size: 13px; }

/* 茫聜炉茫聜陇茫聜鹿莽聰禄茅聺垄 */
.screen-quiz {
  min-height: 100vh; min-height: 100dvh;
  background: #f5f6fa; padding: 12px 12px 32px;
}
.quiz-inner { max-width: 720px; margin: 0 auto; }
.quiz-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding: 0 2px; }
.back-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 6px 10px; color: #666; }
.progress-text { font-size: 13px; color: #888; font-weight: 600; }

.q-card {
  background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); margin-bottom: 12px;
}
.q-badge {
  display: inline-block; background: #e8eaf6; color: #0f3460; padding: 4px 12px;
  border-radius: 12px; font-size: 11px; font-weight: 700; margin-bottom: 12px;
}
.q-text { font-size: 16px; line-height: 1.7; color: #1a1a2e; font-weight: 700; }

.ans-card {
  background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); margin-bottom: 12px;
}
.ans-label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 600; }
.ans-textarea {
  width: 100%; min-height: 180px; padding: 12px 14px; font-size: 15px; line-height: 1.8;
  border-radius: 12px; border: 2px solid #e8eaf6; background: white;
  outline: none; resize: vertical; transition: border-color 0.2s;
  -webkit-appearance: none;
}
.ans-textarea:focus { border-color: #0f3460; }
.ans-textarea:disabled { background: #fafafa; }
.show-btn {
  width: 100%; padding: 14px; margin-top: 12px; border-radius: 12px;
  border: none; background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white; font-size: 14px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 16px rgba(15,52,96,0.3); -webkit-appearance: none;
}
.show-btn:active { transform: scale(0.98); }

.model-card {
  background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 20px rgba(0,0,0,0.06);
  margin-bottom: 12px; border-left: 4px solid #0f3460;
}
.model-label { font-size: 13px; color: #0f3460; font-weight: 700; margin-bottom: 10px; }
.model-text { font-size: 14px; line-height: 2; color: #333; white-space: pre-wrap; }

.kp-card {
  background: #fff8e1; border-radius: 16px; padding: 18px 20px;
  margin-bottom: 12px; border-left: 4px solid #ff9800;
}
.kp-label { font-size: 13px; color: #e65100; font-weight: 700; margin-bottom: 8px; }
.kp-item {
  font-size: 13px; line-height: 1.7; color: #333; padding: 4px 0 4px 14px;
  border-bottom: 1px solid rgba(255,152,0,0.15); position: relative;
}
.kp-item:last-child { border-bottom: none; }
.kp-item::before { content: '芒聙垄'; position: absolute; left: 0; color: #ff9800; }

.scoring-card {
  background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 20px rgba(0,0,0,0.06); margin-bottom: 12px;
}
.scoring-title { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 12px; text-align: center; }
.scoring-btns { display: flex; gap: 10px; justify-content: center; }
.score-btn {
  flex: 1; padding: 14px 6px; border-radius: 14px; cursor: pointer;
  transition: all 0.15s; text-align: center; border: 2px solid transparent;
  -webkit-appearance: none; background: transparent;
}
.score-btn:active { transform: scale(0.96); }
.score-btn.green { background: #e8f5e9; border-color: #e8f5e9; }
.score-btn.green:active { border-color: #4caf50; }
.score-btn.orange { background: #fff3e0; border-color: #fff3e0; }
.score-btn.orange:active { border-color: #ff9800; }
.score-btn.red { background: #ffebee; border-color: #ffebee; }
.score-btn.red:active { border-color: #ef5350; }
.score-btn .icon { font-size: 22px; margin-bottom: 2px; }
.score-btn .name { font-size: 12px; font-weight: 700; }
.score-btn .desc { font-size: 10px; color: #888; margin-top: 3px; }
.score-btn.green .name { color: #4caf50; }
.score-btn.orange .name { color: #ff9800; }
.score-btn.red .name { color: #ef5350; }

.next-btn {
  width: 100%; padding: 15px; border-radius: 14px;
  border: none; background: linear-gradient(135deg, #1a1a2e, #0f3460);
  color: white; font-size: 15px; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 16px rgba(15,52,96,0.3); margin-bottom: 12px;
  -webkit-appearance: none;
}
.next-btn:active { transform: scale(0.98); }

/* 莽碌聬忙聻聹莽聰禄茅聺垄 */
.screen-result {
  min-height: 100vh; min-height: 100dvh;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 16px 16px 40px;
}
.result-inner { max-width: 680px; margin: 0 auto; }
.result-header { text-align: center; padding: 32px 0 20px; color: white; }
.result-header h1 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
.result-header p { font-size: 14px; opacity: 0.8; }

.result-card { background: rgba(255,255,255,0.95); border-radius: 18px; padding: 24px; margin-bottom: 18px; }
.result-scores { display: flex; justify-content: center; gap: 28px; margin-bottom: 18px; }
.result-scores .item { text-align: center; }
.result-scores .num { font-size: 32px; font-weight: 800; }
.result-scores .lbl { font-size: 12px; color: #666; }

.cat-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; }
.cat-row .name { font-size: 12px; min-width: 110px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cat-row .bar { flex: 1; display: flex; height: 8px; border-radius: 4px; overflow: hidden; background: #eee; }
.cat-row .bar-g { background: #4caf50; }
.cat-row .bar-o { background: #ff9800; }
.cat-row .bar-r { background: #ef5350; }
.cat-row .detail { font-size: 11px; min-width: 65px; text-align: right; color: #888; }

.review-card { background: rgba(255,255,255,0.95); border-radius: 18px; padding: 24px; margin-bottom: 18px; }
.review-card h3 { font-size: 14px; margin-bottom: 14px; color: #333; font-weight: 700; }
.review-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
.review-item:last-child { border-bottom: none; }
.review-item .top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.review-item .cat { font-size: 11px; color: #0f3460; font-weight: 600; }
.review-item .q { font-size: 13px; color: #333; line-height: 1.6; margin-bottom: 6px; }
.review-item .kp { font-size: 11px; color: #888; line-height: 1.6; }
.review-item .kp strong { font-weight: 600; color: #e65100; }

.home-btn {
  width: 100%; padding: 15px; border-radius: 14px;
  border: none; background: white; color: #0f3460;
  font-size: 15px; font-weight: 700; cursor: pointer;
  -webkit-appearance: none;
}
.home-btn:active { transform: scale(0.98); }

/* 氓聟卤忙聹聣茫聝聹茫聜驴茫聝鲁 */
.share-section { margin-top: 12px; text-align: center; }
.share-btn {
  display: inline-block; padding: 10px 24px; border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.1);
  color: white; font-size: 13px; font-weight: 600; cursor: pointer;
  -webkit-appearance: none; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  transition: all 0.15s;
}
.share-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.2); }

@media (max-width: 480px) {
  .menu-header h1 { font-size: 19px; }
  .result-scores { gap: 18px; }
  .result-scores .num { font-size: 28px; }
  .cat-row .name { min-width: 90px; font-size: 11px; }
}
</style>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
